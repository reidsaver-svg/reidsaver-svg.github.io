<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Listing Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --paper:#F6F4EF;
    --grid:#DCE4E8;
    --ink:#1C2A3A;
    --ink-soft:#5B6B7A;
    --line:#D6D3C9;
    --panel:#FFFFFF;
    --accent:#2D5F6D;
    --accent-soft:#DCE9EA;
    --danger:#B4463F;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'IBM Plex Sans', sans-serif;
    color:var(--ink);
    background:
      linear-gradient(var(--grid) 1px, transparent 1px) 0 0/28px 28px,
      linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0/28px 28px,
      var(--paper);
    min-height:100vh;
  }
  .app{display:flex; min-height:100vh;}

  /* Sidebar */
  .sidebar{
    width:290px;
    flex-shrink:0;
    background:var(--panel);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
  }
  .sidebar-head{
    padding:20px 18px 14px;
    border-bottom:1px solid var(--line);
  }
  .sidebar-head h1{
    font-family:'Fraunces', serif;
    font-size:20px;
    font-weight:700;
    margin:0 0 2px;
    letter-spacing:-0.01em;
  }
  .sidebar-head p{margin:0; font-size:12px; color:var(--ink-soft);}
  .search-box{padding:12px 18px;}
  .search-box input{
    width:100%;
    padding:8px 10px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:13px;
    font-family:inherit;
    background:var(--paper);
  }
  .house-list{flex:1; overflow-y:auto; padding:4px 10px 10px;}
  .house-card{
    position:relative;
    display:flex;
    flex-direction:column;
    gap:3px;
    padding:11px 12px 11px 16px;
    margin:4px 0;
    border-radius:8px;
    cursor:pointer;
    border:1px solid transparent;
    background:var(--paper);
  }
  .house-card::before{
    content:"";
    position:absolute;
    left:0; top:6px; bottom:6px;
    width:4px;
    border-radius:3px;
    background: var(--tag);
  }
  .house-card.active{
    background:var(--accent-soft);
    border-color:var(--accent);
  }
  .house-card .addr{font-weight:600; font-size:13.5px;}
  .house-card .meta{font-size:11px; color:var(--ink-soft); font-family:'IBM Plex Mono', monospace;}
  .empty-list{padding:20px 14px; font-size:12.5px; color:var(--ink-soft);}

  .new-btn{
    margin:10px 18px 16px;
    padding:10px;
    background:var(--ink);
    color:#fff;
    border:none;
    border-radius:8px;
    font-family:inherit;
    font-weight:600;
    font-size:13.5px;
    cursor:pointer;
  }
  .new-btn:hover{background:var(--accent);}

  /* Main */
  .main{flex:1; padding:32px 40px; overflow-y:auto;}
  .placeholder{
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--ink-soft);
    font-family:'Fraunces', serif;
    font-size:18px;
    text-align:center;
    max-width:340px;
    margin:0 auto;
  }

  .house-header{display:flex; justify-content:space-between; align-items:flex-start; gap:20px; margin-bottom:18px;}
  .house-title{display:flex; align-items:center; gap:10px;}
  .swatch{width:14px; height:14px; border-radius:4px; flex-shrink:0;}
  .house-title h2{font-family:'Fraunces', serif; font-size:26px; font-weight:600; margin:0;}
  .street-label{font-size:12px; color:var(--ink-soft); font-family:'IBM Plex Mono', monospace; margin-top:2px;}
  .delete-btn{
    background:none; border:1px solid var(--line); color:var(--danger);
    border-radius:7px; padding:7px 12px; font-family:inherit; font-size:12.5px; cursor:pointer;
  }
  .delete-btn:hover{background:#FBEAE8;}

  .status-row{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:22px;}
  .status-pill{
    padding:6px 13px; border-radius:20px; font-size:12.5px; font-weight:600;
    border:1px solid var(--line); background:#fff; cursor:pointer; font-family:inherit;
  }
  .status-pill.selected{background:var(--ink); color:#fff; border-color:var(--ink);}

  .progress-wrap{margin-bottom:24px;}
  .progress-label{display:flex; justify-content:space-between; font-size:12px; color:var(--ink-soft); margin-bottom:6px;}
  .progress-bar{height:8px; background:var(--grid); border-radius:5px; overflow:hidden;}
  .progress-fill{height:100%; background:var(--accent); transition:width .25s ease;}

  .fields-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:26px;}
  .field label{display:block; font-size:11.5px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); margin-bottom:4px;}
  .field input, .field textarea{
    width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:7px;
    font-family:inherit; font-size:13.5px; background:#fff;
  }
  .field textarea{resize:vertical; min-height:60px;}

  .checklist-section h3{font-family:'Fraunces', serif; font-size:16px; margin:0 0 10px;}
  .checklist-item{
    display:flex; align-items:center; gap:10px;
    padding:9px 4px; border-bottom:1px solid var(--line);
  }
  .checklist-item input[type=checkbox]{width:17px; height:17px; accent-color:var(--accent); flex-shrink:0;}
  .checklist-item span{flex:1; font-size:14px;}
  .checklist-item.done span{color:var(--ink-soft); text-decoration:line-through;}
  .remove-item{
    background:none; border:none; color:var(--ink-soft); cursor:pointer; font-size:16px; line-height:1;
    padding:2px 6px;
  }
  .remove-item:hover{color:var(--danger);}
  .add-item-row{display:flex; gap:8px; margin-top:12px;}
  .add-item-row input{
    flex:1; padding:8px 10px; border:1px solid var(--line); border-radius:7px; font-family:inherit; font-size:13.5px;
  }
  .add-item-row button{
    padding:8px 14px; border:none; border-radius:7px; background:var(--accent); color:#fff;
    font-family:inherit; font-size:13px; font-weight:600; cursor:pointer;
  }
  .loading{padding:40px; text-align:center; color:var(--ink-soft); font-family:'Fraunces',serif;}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-head">
      <h1>Listing Tracker</h1>
      <p>Every house, one checklist each.</p>
      <div id="saveStatus" style="font-size:11px; margin-top:8px; padding:5px 8px; border-radius:6px; display:none;"></div>
    </div>
    <div class="search-box">
      <input id="searchInput" placeholder="Search address or status..." />
    </div>
    <div class="house-list" id="houseList"></div>
    <button class="new-btn" id="newBtn">+ New Listing</button>
    <div style="display:flex; gap:8px; padding:0 18px 16px;">
      <button id="exportBtn" style="flex:1; padding:8px; background:#fff; border:1px solid var(--line); border-radius:7px; font-family:inherit; font-size:12px; cursor:pointer;">Export backup</button>
      <button id="importBtn" style="flex:1; padding:8px; background:#fff; border:1px solid var(--line); border-radius:7px; font-family:inherit; font-size:12px; cursor:pointer;">Import backup</button>
      <input type="file" id="importFile" accept="application/json" style="display:none;" />
    </div>
  </div>
  <div class="main" id="main">
    <div class="placeholder">Select a listing on the left, or add a new one to get started.</div>
  </div>
</div>

<script>
const DEFAULT_ITEMS = [
  "Professional photos taken",
  "Listing description written",
  "Yard sign installed",
  "Live on MLS",
  "First showing scheduled",
  "Open house scheduled",
  "Inspection completed",
  "Offer received",
  "Under contract",
  "Closing scheduled",
  "Keys handed over"
];
const STATUSES = ["Prepping","Listed","Under Contract","Closed"];
const PALETTE = ["#2D5F6D","#B4463F","#8A6A3B","#4E6B3A","#6B4E8A","#3A6B6B","#8A4E6B","#5B6B23","#3A4E8A","#8A6B23"];

let houses = [];
let activeId = null;
const STORAGE_KEY = 'listing_tracker_houses_v1';

function showSaveStatus(ok, msg){
  const el = document.getElementById('saveStatus');
  if(!el) return;
  el.style.display = 'block';
  if(ok){
    el.style.background = '#E4F0E4';
    el.style.color = '#2F5B2F';
    el.textContent = 'All changes saved';
    setTimeout(()=>{ if(el.textContent==='All changes saved'){ el.style.display='none'; } }, 2000);
  } else {
    el.style.background = '#FBEAE8';
    el.style.color = '#B4463F';
    el.textContent = msg || 'Not saving — see console for details';
  }
}

function hashStreet(street){
  let h = 0;
  const s = street.toLowerCase().trim();
  for(let i=0;i<s.length;i++){ h = (h*31 + s.charCodeAt(i)) >>> 0; }
  return PALETTE[h % PALETTE.length];
}
function extractStreet(address){
  // Take the portion before the first comma; strip leading house number.
  const firstPart = address.split(",")[0].trim();
  const withoutNumber = firstPart.replace(/^\d+\s*/, "").trim();
  return withoutNumber || firstPart || address;
}
function uid(){ return 'h_' + Math.random().toString(36).slice(2,10); }

async function loadHouses(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    houses = raw ? JSON.parse(raw) : [];
  } catch(e){
    console.error('Load failed', e);
    houses = [];
    showSaveStatus(false, 'Could not read saved data — starting fresh.');
  }
  renderSidebar();
  renderMain();
}
function saveHouses(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(houses));
    showSaveStatus(true);
  } catch(e){
    console.error('Save failed', e);
    showSaveStatus(false, 'Save failed: ' + (e.message || 'unknown error'));
  }
}

function renderSidebar(){
  const list = document.getElementById('houseList');
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  const filtered = houses.filter(h =>
    h.address.toLowerCase().includes(q) || h.status.toLowerCase().includes(q)
  );
  if(filtered.length === 0){
    list.innerHTML = '<div class="empty-list">' + (houses.length === 0 ? 'No listings yet.' : 'No matches.') + '</div>';
    return;
  }
  list.innerHTML = filtered.map(h => {
    const color = hashStreet(h.street);
    const doneCount = h.checklist.filter(i=>i.done).length;
    return `<div class="house-card ${h.id===activeId?'active':''}" style="--tag:${color}" data-id="${h.id}">
      <div class="addr">${escapeHtml(h.address)}</div>
      <div class="meta">${h.status} · ${doneCount}/${h.checklist.length}</div>
    </div>`;
  }).join('');
  list.querySelectorAll('.house-card').forEach(el=>{
    el.addEventListener('click', ()=>{ activeId = el.dataset.id; renderSidebar(); renderMain(); });
  });
}

function renderMain(){
  const main = document.getElementById('main');
  const house = houses.find(h=>h.id===activeId);
  if(!house){
    main.innerHTML = '<div class="placeholder">Select a listing on the left, or add a new one to get started.</div>';
    return;
  }
  const color = hashStreet(house.street);
  const doneCount = house.checklist.filter(i=>i.done).length;
  const pct = house.checklist.length ? Math.round((doneCount/house.checklist.length)*100) : 0;

  main.innerHTML = `
    <div class="house-header">
      <div>
        <div class="house-title">
          <div class="swatch" style="background:${color}"></div>
          <h2>${escapeHtml(house.address)}</h2>
        </div>
        <div class="street-label">${escapeHtml(house.street)}</div>
      </div>
      <button class="delete-btn" id="deleteBtn">Delete listing</button>
    </div>

    <div class="status-row" id="statusRow">
      ${STATUSES.map(s => `<button class="status-pill ${s===house.status?'selected':''}" data-status="${s}">${s}</button>`).join('')}
    </div>

    <div class="progress-wrap">
      <div class="progress-label"><span>Checklist progress</span><span>${pct}% (${doneCount}/${house.checklist.length})</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%; background:${color}"></div></div>
    </div>

    <div class="fields-grid">
      <div class="field">
        <label>List price</label>
        <input id="priceInput" value="${escapeHtml(house.price||'')}" placeholder="$450,000" />
      </div>
      <div class="field">
        <label>List date</label>
        <input id="dateInput" type="date" value="${house.listDate||''}" />
      </div>
      <div class="field" style="grid-column:1 / -1;">
        <label>Notes</label>
        <textarea id="notesInput" placeholder="Showing feedback, offer details, contractor names...">${escapeHtml(house.notes||'')}</textarea>
      </div>
    </div>

    <div class="checklist-section">
      <h3>Checklist</h3>
      <div id="checklistItems">
        ${house.checklist.map(item => `
          <div class="checklist-item ${item.done?'done':''}" data-id="${item.id}">
            <input type="checkbox" ${item.done?'checked':''} />
            <span>${escapeHtml(item.text)}</span>
            <button class="remove-item" title="Remove">×</button>
          </div>
        `).join('')}
      </div>
      <div class="add-item-row">
        <input id="newItemInput" placeholder="Add a task..." />
        <button id="addItemBtn">Add</button>
      </div>
    </div>
  `;

  // Wire up events
  document.getElementById('deleteBtn').addEventListener('click', ()=>{
    if(confirm(`Delete ${house.address}? This can't be undone.`)){
      houses = houses.filter(h=>h.id!==house.id);
      activeId = null;
      saveHouses(); renderSidebar(); renderMain();
    }
  });
  document.querySelectorAll('#statusRow .status-pill').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      house.status = btn.dataset.status;
      saveHouses(); renderSidebar(); renderMain();
    });
  });
  document.getElementById('priceInput').addEventListener('input', e=>{ house.price = e.target.value; saveHouses(); renderSidebar(); });
  document.getElementById('dateInput').addEventListener('input', e=>{ house.listDate = e.target.value; saveHouses(); });
  document.getElementById('notesInput').addEventListener('input', e=>{ house.notes = e.target.value; saveHouses(); });

  document.querySelectorAll('.checklist-item').forEach(el=>{
    const id = el.dataset.id;
    el.querySelector('input[type=checkbox]').addEventListener('change', e=>{
      const item = house.checklist.find(i=>i.id===id);
      item.done = e.target.checked;
      saveHouses(); renderSidebar(); renderMain();
    });
    el.querySelector('.remove-item').addEventListener('click', ()=>{
      house.checklist = house.checklist.filter(i=>i.id!==id);
      saveHouses(); renderSidebar(); renderMain();
    });
  });

  document.getElementById('addItemBtn').addEventListener('click', addItem);
  document.getElementById('newItemInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addItem(); });

  function addItem(){
    const input = document.getElementById('newItemInput');
    const text = input.value.trim();
    if(!text) return;
    house.checklist.push({ id: uid(), text, done:false });
    input.value='';
    saveHouses(); renderSidebar(); renderMain();
  }
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('newBtn').addEventListener('click', ()=>{
  const address = prompt("Enter the property address:");
  if(!address || !address.trim()) return;
  const street = extractStreet(address.trim());
  const house = {
    id: uid(),
    address: address.trim(),
    street,
    status: "Prepping",
    price: "",
    listDate: "",
    notes: "",
    checklist: DEFAULT_ITEMS.map(text => ({ id: uid(), text, done:false }))
  };
  houses.push(house);
  activeId = house.id;
  saveHouses(); renderSidebar(); renderMain();
});

document.getElementById('searchInput').addEventListener('input', renderSidebar);

document.getElementById('exportBtn').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(houses, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'listing-tracker-backup.json';
  a.click();
  URL.revokeObjectURL(url);
});
document.getElementById('importBtn').addEventListener('click', ()=>{
  document.getElementById('importFile').click();
});
document.getElementById('importFile').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const imported = JSON.parse(reader.result);
      if(!Array.isArray(imported)) throw new Error('File is not a valid backup.');
      if(houses.length > 0 && !confirm('This will replace your current listings with the imported backup. Continue?')) return;
      houses = imported;
      activeId = null;
      saveHouses(); renderSidebar(); renderMain();
    } catch(err){
      alert('Could not read that file: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

loadHouses();
</script>
</body>
</html>
